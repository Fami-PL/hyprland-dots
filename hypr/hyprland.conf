hyprland_conf = """# ============================================
# Hyprland Config - Based on old hyprland.lua
# Noctalia v5 compatible
# ============================================

# Environment variables
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_SCALE,1
env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_SIZE,24
env = APPIMAGELAUNCHER_DISABLE,1
env = OZONE_PLATFORM,wayland

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_VRR_ALLOWED,1
env = WLR_DRM_NO_ATOMIC,1

# ============================================
# Autostart
# ============================================
exec-once = sleep 2 && noctalia

# ============================================
# Input
# ============================================
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

# ============================================
# General
# ============================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

# ============================================
# Decoration
# ============================================
decoration {
    rounding = 10
    rounding_power = 2
    
    blur {
        enabled = true
        size = 3
        passes = 3
        vibrancy = 0.1696
    }
    
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1a99)
    }
    
    dim_special = 0.2
    inactive_opacity = 0.9
}

# ============================================
# Layout
# ============================================
dwindle {
    preserve_split = true
    smart_resizing = true
}

# ============================================
# Misc
# ============================================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ============================================
# Cursor
# ============================================
cursor {
    inactive_timeout = 30
}

# ============================================
# Monitors
# ============================================
monitor = ,preferred,auto,1

# ============================================
# Variables
# ============================================
$mainMod = SUPER

# ============================================
# Window Management
# ============================================
bind = $mainMod, T, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 50% 50%
bind = $mainMod, F, fullscreen
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, P, exec, hyprctl dispatch togglefloating && hyprctl dispatch pin
bind = $mainMod SHIFT, P, exec, hyprctl dispatch togglefloating && hyprctl dispatch pin && hyprctl dispatch tagwindow overlay

# ============================================
# Program Launchers
# ============================================
bind = $mainMod, RETURN, exec, konsole
bind = $mainMod, E, exec, dolphin ~
bind = $mainMod, W, exec, helium-browser
bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only --freeze

# ============================================
# Noctalia v5 IPC
# ============================================
bind = $mainMod, SPACE, exec, noctalia msg panel-toggle launcher
bind = $mainMod, escape, exec, noctalia msg panel-toggle control-center
bind = $mainMod, S, exec, noctalia msg settings-toggle
bind = $mainMod, L, exec, noctalia msg session lock
bind = $mainMod, V, exec, noctalia msg panel-toggle clipboard
bind = $mainMod, X, exec, noctalia msg panel-toggle session

# ============================================
# Audio Controls (using wpctl)
# ============================================
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ============================================
# Brightness Controls (using brightnessctl)
# ============================================
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ============================================
# Other Media Keys
# ============================================
bind = , XF86WLAN, exec, nmcli radio wifi toggle
bind = , XF86Refresh, exec, xdotool key F5

# ============================================
# Move Focus
# ============================================
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ============================================
# Swap Windows
# ============================================
bind = $mainMod CTRL, left, swapwindow, l
bind = $mainMod CTRL, right, swapwindow, r
bind = $mainMod CTRL, up, swapwindow, u
bind = $mainMod CTRL, down, swapwindow, d

# ============================================
# Resize Windows
# ============================================
binde = $mainMod ALT, left, resizeactive, -50 0
binde = $mainMod ALT, right, resizeactive, 50 0
binde = $mainMod ALT, up, resizeactive, 0 -50
binde = $mainMod ALT, down, resizeactive, 0 50

# ============================================
# Workspaces
# ============================================
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ============================================
# Move to Workspace
# ============================================
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ============================================
# Scroll Workspaces
# ============================================
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ============================================
# Mouse Binds
# ============================================
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# HyprMod managed settings
source = /home/fami/.config/hypr/hyprland-gui.conf

